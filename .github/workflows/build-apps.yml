name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle: nsis
            artifact_name: windows-exe
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundle: dmg
            artifact_name: macos-dmg
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            bundle: appimage
            artifact_name: linux-appimage
            artifact_path: src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        env:
          CI: true
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
