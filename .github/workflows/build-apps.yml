name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle: nsis
            target: ''
            artifact_name: windows-exe
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundle: dmg
            target: universal-apple-darwin
            artifact_name: macos-dmg
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            bundle: appimage
            target: ''
            artifact_name: linux-appimage
            artifact_path: src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Injecting version: ${VERSION}"
          VERSION="$VERSION" node -e "const fs=require('fs');const version=process.env.VERSION;const confPath='src-tauri/tauri.conf.json';const cargoPath='src-tauri/Cargo.toml';const conf=JSON.parse(fs.readFileSync(confPath,'utf8'));conf.version=version;fs.writeFileSync(confPath,JSON.stringify(conf,null,2)+'\\n');let cargo=fs.readFileSync(cargoPath,'utf8');cargo=cargo.replace(/(\\[package\\][\\s\\S]*?\\nversion\\s*=\\s*\")[^\"]+(\")/,`$1${version}$2`);fs.writeFileSync(cargoPath,cargo);"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        env:
          CI: true
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            pnpm tauri build --bundles ${{ matrix.bundle }} --target ${{ matrix.target }}
          else
            pnpm tauri build --bundles ${{ matrix.bundle }}
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**
